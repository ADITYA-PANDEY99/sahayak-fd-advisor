<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- SBI: Blue circle with iconic keyhole/torch brandmark -->
  <circle cx="50" cy="50" r="50" fill="#1B4F9B"/>
  <!-- Keyhole: upper circle (lock body) -->
  <circle cx="50" cy="34" r="17" fill="white"/>
  <!-- Keyhole: inner cutout -->
  <circle cx="50" cy="34" r="7.5" fill="#1B4F9B"/>
  <!-- Keyhole: stem (tapers down) -->
  <polygon points="42,49 58,49 56,72 44,72" fill="white"/>
  <!-- Keyhole: base bar -->
  <rect x="37" y="69" width="26" height="6" rx="3" fill="white"/>
</svg>
